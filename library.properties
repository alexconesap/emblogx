sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: embedded-first logging with FDA-compliant audit router.
paragraph=Embedded C++17 logger and status router. Single-call API fans out to multiple sinks (console, memory ring, HTTP, SD, MQTT). Sinks declare capabilities (LOG / AUDIT / STATUS) and a sync or async dispatch mode; the router formats once and dispatches to matching sinks. Zero heap, fixed capacity, deterministic. Supported targets: ESP32 today (UART, SD via UngulaSd, HTTP via UngulaNet); STM32 and other MCUs via the portable core and host-supplied sinks.
